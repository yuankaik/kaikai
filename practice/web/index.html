<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Captain Deck</title>
  <style>
    :root {
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --wash: #f5f5f7;
      --paper: #ffffff;
      --blue: #0071e3;
      --line: rgba(0, 0, 0, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      background: var(--wash);
      color: var(--ink);
      letter-spacing: 0;
    }
    main { max-width: 1080px; margin: 0 auto; padding: 32px 22px; }
    .hero { display: grid; grid-template-columns: 1fr; gap: 18px; margin-bottom: 22px; }
    h1 { font-size: 48px; line-height: 1.08; margin: 0; }
    h2 { margin: 0 0 14px; font-size: 26px; }
    .summary { color: var(--muted); font-size: 18px; margin: 8px 0 0; }
    .deck-art { width: 100%; display: block; border-radius: 8px; }
    .gameplay-video { aspect-ratio: 45 / 13; object-fit: cover; background: #000; }
    .poster-reel {
      display: grid;
      grid-template-columns: repeat(6, minmax(180px, 1fr));
      gap: 12px;
      overflow: hidden;
      padding: 12px;
      background: #111827;
      animation: deckFloat 7s ease-in-out infinite;
    }
    .poster-reel figure { margin: 0; min-width: 0; position: relative; }
    .poster-reel img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; display: block; border-radius: 8px; }
    .poster-reel figcaption {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      color: #fff;
      background: rgba(0, 0, 0, .45);
      font-size: 12px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .grid { display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; }
    .panel, .mission {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .03);
    }
    .missions { display: grid; gap: 12px; }
    .mission { display: grid; gap: 7px; }
    .mission span { color: var(--blue); font-weight: 800; }
    .mission strong { font-size: 24px; line-height: 1.25; }
    .mission em { color: var(--muted); font-style: normal; line-height: 1.5; }
    .stat { font-size: 28px; font-weight: 800; margin: 8px 0; }
    .meter { height: 10px; border-radius: 999px; background: #e8e8ed; overflow: hidden; margin: 8px 0 16px; }
    .meter span { display: block; height: 100%; background: var(--blue); }
    .unlock { display: grid; gap: 10px; margin-top: 18px; }
    .unlock div { padding: 14px; border-radius: 8px; background: #f5f5f7; color: var(--muted); font-weight: 700; }
    @media (max-width: 760px) {
      h1 { font-size: 36px; }
      .grid { grid-template-columns: 1fr; }
      .poster-reel { grid-template-columns: repeat(3, minmax(150px, 1fr)); }
    }
    @keyframes deckFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <h1>Captain Deck</h1>
        <p class="summary">袁佳乐的专属学习游戏账号</p>
      </div>
      <div class="deck-art poster-reel">
        <figure>
          <img src="../../resources/gameplay/posters/34661468603.jpg" alt="珊瑚礁·蓝海与传说钓客&amp;珊瑚礁的猎人" />
          <figcaption>珊瑚礁·蓝海与传说钓客&amp;珊瑚礁的猎人</figcaption>
        </figure>
        

        <figure>
          <img src="../../resources/gameplay/posters/34708983092.jpg" alt="蓝洞·潜伏海底的生物" />
          <figcaption>蓝洞·潜伏海底的生物</figcaption>
        </figure>
        

        <figure>
          <img src="../../resources/gameplay/posters/34745418841.jpg" alt="沉船·鱼之乐园的守护者" />
          <figcaption>沉船·鱼之乐园的守护者</figcaption>
        </figure>
        

        <figure>
          <img src="../../resources/gameplay/posters/34796408533.jpg" alt="海底遗迹·沉睡于海底遗迹的巨影" />
          <figcaption>海底遗迹·沉睡于海底遗迹的巨影</figcaption>
        </figure>
        

        <figure>
          <img src="../../resources/gameplay/posters/35059732169.jpg" alt="淡水区·淡水区的统治者" />
          <figcaption>淡水区·淡水区的统治者</figcaption>
        </figure>
        

        <figure>
          <img src="../../resources/gameplay/posters/35301950239.jpg" alt="岩石礁·掌管岩石礁的法外之徒" />
          <figcaption>岩石礁·掌管岩石礁的法外之徒</figcaption>
        </figure>
        </div>
    </section>
    <section class="grid">
      <div class="panel">
        <h2>今日航线</h2>
        <div class="missions">
        <a class="mission" href="Day4-虎鲸队长的除法航线.html">
          <span>Day4</span>
          <strong>Day4-虎鲸队长的除法航线</strong>
          <em>除法陷阱回炉 + 容量单位复测 + 三科课堂雷达</em>
        </a>
        </div>
      </div>
      <aside class="panel">
        <h2>知识鱼图鉴</h2>
        <p class="stat">Switch2 1903/3500</p>
        <div class="meter"><span style="width:54.4%"></span></div>
        <p class="stat">知识鱼 2/93</p>
        <div class="meter"><span style="width:2.2%"></span></div>
        <div class="unlock">
          <div>今日目标：完成练习，抓回一条薄弱点知识鱼。</div>
          <div>待解锁：除法 Boss 识别 · 容量单位复测 · 课堂雷达</div>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
